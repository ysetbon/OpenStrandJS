# CD: deploy the editor to GitHub Pages on every push to main (i.e. after each
# merge), plus on demand via the Actions tab (workflow_dispatch).
#
# This is the automated twin of `npm run deploy` (tools/deploy-pages.mjs): build
# with Vite, then force-push ONLY dist-editor/ to the gh-pages branch. It uses
# the workflow's built-in GITHUB_TOKEN, so no extra secret is needed, and it
# works with the existing Pages configuration (source: gh-pages branch).
#
# Live site: https://ysetbon.github.io/OpenStrandJS/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and publish gh-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Build editor (Vite)
        run: npm run build:editor

      - name: Publish dist-editor/ to gh-pages
        run: |
          # .nojekyll stops GitHub Pages from running Jekyll over the Vite output.
          touch dist-editor/.nojekyll
          cd dist-editor
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy editor build from ${GITHUB_SHA:0:7}"
          git push -f -q "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
