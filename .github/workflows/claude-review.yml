# Automatic Claude code review on every pull request.
#
# Requires one repository secret: ANTHROPIC_API_KEY
# (Settings -> Secrets and variables -> Actions -> New repository secret).
# See docs/CI_CD.md for setup details and how to also enable the Baz reviewer.
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  claude-review:
    # Skip drafts; review runs when the PR is marked ready.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for OpenStrandJS, a fidelity-first
            JavaScript/Canvas port of OpenStrand Studio. The Qt app is the spec
            and the pixel oracle, so pay special attention to:

            - Correctness bugs and regressions in the renderer
              (web/strand-renderer.js) and the editor code under src/ —
              anything that could change rendered pixels needs scrutiny.
            - Silent behavioral drift from the OSS oracle: changed defaults,
              altered draw order, dropped meta fields.
            - State-management issues in the zustand store and the
              undo/redo history.
            - TypeScript type safety and obvious performance problems in
              hot paths (drag, render scheduling).

            Report every issue you find, including ones you are uncertain
            about, with your confidence and an estimated severity. Use inline
            comments for specific lines and finish with a short summary
            comment. Do not comment on style-only nits.
          claude_args: '--allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
