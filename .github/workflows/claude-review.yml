# Opt-in Claude code review. It does NOT run automatically on every PR — that
# spent real ANTHROPIC_API_KEY tokens on each push. Instead it runs only when a
# PR carries the `claude-review` label: add the label to request a review (and
# it re-reviews that PR on later pushes while the label stays on); remove the
# label to stop. CodeRabbit still reviews every PR automatically, so routine
# PRs keep review coverage at no Anthropic-API cost.
#
# First use: create the label once (repo -> Issues -> Labels -> New label,
# name it exactly `claude-review`), then add it to a PR.
#
# Requires one repository secret: ANTHROPIC_API_KEY
# (Settings -> Secrets and variables -> Actions -> New repository secret).
# See docs/CI_CD.md for setup details and how to also enable the Baz reviewer.
name: Claude Code Review

on:
  pull_request:
    # `ready_for_review` is included so a PR labeled while still a draft starts
    # its review the moment it is marked ready (the non-draft gate below skips
    # the `labeled` event that fired during draft).
    types: [labeled, synchronize, reopened, ready_for_review]

jobs:
  claude-review:
    # Opt-in gate: non-draft PRs that carry the `claude-review` label. On a
    # `labeled` event only run when the label just added IS `claude-review` (so
    # adding unrelated labels never spends tokens); on synchronize/reopen run
    # while the label is present.
    if: >-
      github.event.pull_request.draft == false &&
      (
        (github.event.action == 'labeled' && github.event.label.name == 'claude-review') ||
        (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'claude-review'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for OpenStrandJS, a fidelity-first
            JavaScript/Canvas port of OpenStrand Studio. The Qt app is the spec
            and the pixel oracle, so pay special attention to:

            - Correctness bugs and regressions in the renderer
              (web/strand-renderer.js) and the editor code under src/ —
              anything that could change rendered pixels needs scrutiny.
            - Silent behavioral drift from the OSS oracle: changed defaults,
              altered draw order, dropped meta fields.
            - State-management issues in the zustand store and the
              undo/redo history.
            - TypeScript type safety and obvious performance problems in
              hot paths (drag, render scheduling).

            Report every issue you find, including ones you are uncertain
            about, with your confidence and an estimated severity. Use inline
            comments for specific lines and finish with a short summary
            comment. Do not comment on style-only nits.
          claude_args: '--allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
