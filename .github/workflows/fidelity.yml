# OSS-vs-JS visual fidelity bot.
#
# On every PR it renders each corpus fixture with BOTH the real OpenStrandStudio
# Qt canvas (the pixel oracle) and the JS/Paper.js renderer, pixel-diffs them,
# and posts a sticky PR comment with a match% table plus an inline
# OSS | JS | diff montage per fixture. The montages are also uploaded as a
# downloadable workflow artifact (`fidelity-montages`).
#
# Phase 3 (opt-in): if the PR carries the `claude-review` label, a second job
# asks Claude to inspect the worst-matching fixtures and post inline code
# suggestions. Token cost only when that label is present (needs ANTHROPIC_API_KEY).
#
# The match% gate is ADVISORY for now (render errors hard-fail; regressions only
# warn in the comment) until the committed baselines are recalibrated in this CI
# environment. Flip `--errors-only` off in the "Run fidelity harness" step to make
# regressions blocking.
name: Fidelity (OSS vs JS)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]   # publish the canonical dashboard to Pages on each merge
  workflow_dispatch:

concurrency:
  group: fidelity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  OSS_REPO: ysetbon/OpenStrandStudio
  # Pinned oracle commit — the fidelity spec. Bump deliberately (and refresh
  # fidelity-baselines.json) when you want to track a newer OpenStrandStudio.
  OSS_SHA: 0d751d90f79c97c7ea9994fd02234fe066935a47
  PYQT_VERSION: "5.15.11"
  ARTIFACTS_BRANCH: ci-fidelity

jobs:
  fidelity:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push montages to ci-fidelity + the dashboard to gh-pages
      pull-requests: write   # upsert the sticky comment
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false   # this job builds its own authed remote for the push

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System libs for headless Qt (QtMultimedia -> libpulse)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpulse-mainloop-glib0 libgl1 libegl1 libxkbcommon0 \
            libdbus-1-3 libglib2.0-0 libfontconfig1 libfreetype6

      - name: Python deps (Qt oracle)
        run: pip install "PyQt5==${{ env.PYQT_VERSION }}" pillow

      - name: Clone OpenStrandStudio oracle (pinned SHA, shallow)
        run: |
          set -e
          OSS_DIR="${{ runner.temp }}/OpenStrandStudio"
          mkdir -p "$OSS_DIR" && cd "$OSS_DIR"
          git init -q
          git remote add origin "https://github.com/${{ env.OSS_REPO }}"
          git fetch -q --depth 1 origin "${{ env.OSS_SHA }}"
          git checkout -q FETCH_HEAD

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run fidelity harness (Qt oracle vs JS)
        id: run
        env:
          OSS_ROOT: ${{ runner.temp }}/OpenStrandStudio
          QT_QPA_PLATFORM: offscreen
        run: |
          set +e
          node tools/fidelity_run.mjs --errors-only --tolerance 1.0
          echo "code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Build standalone fidelity.html (self-contained, viewable)
        if: always()
        run: node tools/fidelity_artifact.mjs "${{ env.OSS_SHA }}" || echo "::warning::fidelity.html build failed"

      # Host the dashboards on GitHub Pages (the same gh-pages site as the editor)
      # as a GALLERY:
      #   /fidelity/index.html         the landing page — one card per dashboard
      #                                (snapshot thumbnail + PR # + head branch + summary)
      #   /fidelity/main/index.html    canonical dashboard (latest merged state)
      #   /fidelity/pr-<N>/index.html  per-PR preview
      # Each run writes ONLY its own <sub>/ entry (index.html + meta.json + thumb.png)
      # via tools/fidelity_entry.mjs, then rebuilds the landing index from the union
      # of every <sub>/meta.json via tools/fidelity_index.mjs — so a PR run refreshes
      # the gallery without touching another PR's entry. Non-destructive: clone
      # gh-pages, apply, fast-forward push with retry. The editor deploy carries
      # /fidelity/ forward across its own force-push (see deploy.yml), so both coexist.
      - name: Publish dashboard to GitHub Pages (/fidelity gallery)
        id: pages
        if: always() && github.repository == 'ysetbon/OpenStrandJS'
        continue-on-error: true   # fork PRs (read-only token) fall back to the artifact/comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
          # Card metadata — passed via env (never inline-expanded) so a PR title or
          # branch name can't inject into the shell.
          FID_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || 'main' }}
          FID_TITLE: ${{ github.event_name == 'pull_request' && github.event.pull_request.title || 'Canonical dashboard (latest main)' }}
          FID_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -e
          [ -f artifacts/fidelity/artifact.html ] || { echo "no artifact.html; skipping"; exit 0; }
          if [ "$IS_PR" = "true" ]; then SUB="pr-${PR}"; FID_KIND="pr"; else SUB="main"; FID_KIND="main"; fi
          export FID_KIND FID_PR="$PR"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          WT="${{ runner.temp }}/gh-pages-fidelity"
          pushed=0
          for attempt in 1 2 3 4 5; do
            rm -rf "$WT"
            if git ls-remote --exit-code --heads "$REMOTE" gh-pages >/dev/null 2>&1; then
              git clone -q --depth 1 --branch gh-pages "$REMOTE" "$WT"
            else
              mkdir -p "$WT"; git -C "$WT" init -q; git -C "$WT" checkout -q --orphan gh-pages
            fi
            git -C "$WT" config user.name "github-actions[bot]"
            git -C "$WT" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            mkdir -p "$WT/fidelity"
            # Write THIS run's entry (index.html + meta.json + thumb.png), then
            # rebuild the landing gallery from every entry present in the clone.
            node tools/fidelity_entry.mjs "$WT/fidelity" "$SUB"
            node tools/fidelity_index.mjs "$WT/fidelity"
            touch "$WT/.nojekyll"
            git -C "$WT" add -A
            if git -C "$WT" diff --cached --quiet; then echo "no dashboard change"; pushed=1; break; fi
            git -C "$WT" commit -q -m "fidelity dashboard: ${SUB} @ ${GITHUB_SHA:0:7}"
            if git -C "$WT" push -q "$REMOTE" "HEAD:gh-pages"; then pushed=1; break; fi
            echo "gh-pages advanced (attempt ${attempt}); retrying"; sleep $((attempt * 2))
          done
          # Only expose the Pages URL when the push actually landed, so a failed
          # publish (e.g. a fork PR's read-only token) leaves the URL unset and the
          # comment falls back to the artifact/inline images instead of linking a 404.
          if [ "$pushed" = "1" ] && [ "$IS_PR" = "true" ]; then
            echo "url=https://ysetbon.github.io/OpenStrandJS/fidelity/pr-${PR}/" >> "$GITHUB_OUTPUT"
          elif [ "$pushed" = "1" ]; then
            echo "url=https://ysetbon.github.io/OpenStrandJS/fidelity/main/" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::could not publish dashboard to gh-pages after retries"
          fi

      - name: Upload fidelity artifact (montages + viewable HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fidelity-montages
          path: |
            artifacts/fidelity/artifact.html
            artifacts/fidelity/**/montage.png
            artifacts/fidelity/**/reference.png
            artifacts/fidelity/**/js.png
            artifacts/fidelity/**/diff.png
            artifacts/fidelity/report.json
          if-no-files-found: warn

      - name: Publish montages to ci-fidelity branch (for inline images)
        id: publish
        continue-on-error: true   # fork PRs lack write token -> fall back to a table-only comment
        if: always() && github.event_name == 'pull_request'
        env:
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BR="${{ env.ARTIFACTS_BRANCH }}"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          WT="${{ runner.temp }}/fidelity-artifacts"
          rm -rf "$WT"; mkdir -p "$WT"; cd "$WT"
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # This branch is shared across PRs (each writes only its own pr-<N>/ dir).
          # To avoid clobbering a concurrent PR's commit, always start from the
          # latest remote tip, apply ONLY this PR's montages on top, and use a
          # plain fast-forward push; on a non-fast-forward rejection (another PR
          # pushed in between) refresh and retry. No force push.
          pushed=0
          for attempt in 1 2 3 4 5; do
            if git ls-remote --exit-code --heads "$REMOTE" "$BR" >/dev/null 2>&1; then
              git fetch -q --depth 1 "$REMOTE" "$BR"
              git checkout -q -B "$BR" FETCH_HEAD
            else
              git checkout -q --orphan "$BR"
              git reset -q --hard 2>/dev/null || true
            fi
            rm -rf "pr-${PR}"; mkdir -p "pr-${PR}"
            for m in "$GITHUB_WORKSPACE"/artifacts/fidelity/*/montage.png; do
              [ -f "$m" ] || continue
              cp "$m" "pr-${PR}/$(basename "$(dirname "$m")").png"
            done
            git add -A
            if git diff --cached --quiet; then
              echo "no montage changes to publish"; pushed=1; break
            fi
            git commit -q -m "fidelity montages: PR #${PR} @ ${SHA}"
            if git push -q "$REMOTE" "HEAD:${BR}"; then
              pushed=1; break
            fi
            echo "push rejected (attempt ${attempt}): ${BR} advanced, refreshing and retrying"
            sleep $((attempt * 2))
          done
          [ "$pushed" = "1" ] || echo "::warning::could not publish montages after retries (inline images may be stale; table + artifact are unaffected)"
          echo "url_base=https://raw.githubusercontent.com/${{ github.repository }}/${BR}/pr-${PR}" >> "$GITHUB_OUTPUT"

      - name: Build PR comment (with inline montages)
        if: always() && github.event_name == 'pull_request'
        env:
          MONTAGE_URL_BASE: ${{ steps.publish.outputs.url_base }}
          CACHE_BUST: ${{ github.event.pull_request.head.sha }}
          PAGES_URL: ${{ steps.pages.outputs.url }}
        run: node tools/fidelity_comment.mjs

      - name: Upsert sticky fidelity comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true   # read-only GITHUB_TOKEN on fork PRs must not fail a successful render
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try { body = fs.readFileSync('artifacts/fidelity/comment.md', 'utf8'); }
            catch { core.warning('no comment.md; skipping'); return; }
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = '<!-- fidelity-bot -->';
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });

      - name: Gate (render errors block; regressions are advisory)
        if: always()
        env:
          HARNESS_CODE: ${{ steps.run.outputs.code }}   # via env, not inline expansion (template-injection safe)
        run: |
          if [ "$HARNESS_CODE" != "0" ]; then
            echo "::error::Fidelity harness reported render errors."
            exit 1
          fi
          echo "Fidelity OK (render errors: none)."

  fidelity-claude:
    needs: fidelity
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      contains(github.event.pull_request.labels.*.name, 'claude-review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Fetch fidelity report artifact
        uses: actions/download-artifact@v4
        with:
          name: fidelity-montages
          path: artifacts/fidelity
      - name: Claude fidelity code suggestions
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            A fidelity harness compared the JS renderer (web/strand-renderer.js) against the
            REAL OpenStrandStudio Qt oracle. Read artifacts/fidelity/report.json (produced by
            tools/fidelity_run.mjs). For any fixture whose match_pct is below 99.5% OR marked
            "regressed": true, inspect the corresponding diff and the code changed in this PR,
            hypothesize which renderer code causes the pixel mismatch versus OpenStrandStudio,
            and post concise, specific inline code suggestions on web/strand-renderer.js (or
            src/) to close the gap. Skip fixtures at 100%. Cite the OSS drawing behavior where
            relevant. If nothing is actionable, post a single one-line summary comment saying so.
          claude_args: '--allowed-tools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(cat artifacts/fidelity/report.json)"'
