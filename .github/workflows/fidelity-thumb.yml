# Set which EXAMPLE is a fidelity gallery card's representative snapshot.
#
# This is a manual, ADMIN-ONLY action. GitHub only shows the "Run workflow"
# button to users with write access, and the first job additionally fails unless
# the triggering user has *admin* permission on this repo — so a card's snapshot
# can only be changed by an admin of ysetbon/OpenStrandJS.
#
# It re-points <sub>/thumb.png at the chosen example's already-published snapshot
# (<sub>/snaps/<fixture>.png) and records meta.selected, then rebuilds the gallery
# landing page. Non-destructive: it only rewrites this one entry's card + the
# index, and fast-forward-pushes to gh-pages with retry. The choice is remembered
# by tools/fidelity_entry.mjs across later fidelity re-runs.
name: Fidelity thumbnail (set card snapshot)

on:
  workflow_dispatch:
    inputs:
      sub:
        description: 'Which dashboard entry to update (e.g. "pr-16" or "main")'
        required: true
        type: string
      fixture:
        description: 'Which example to use as that card''s snapshot'
        required: true
        type: choice
        options:
          - fid_shadow_unfolded_attach
          - fid_unfold_angled
          - fid_unfold_chain
          - fid_shadow_folded_attach
          - fid_shadow_cross

concurrency:
  group: gh-pages-fidelity   # serialize with the fidelity publish writers
  cancel-in-progress: false

jobs:
  set-thumb:
    if: github.repository == 'ysetbon/OpenStrandJS'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Hard admin gate: workflow_dispatch is already write-only, but require
      # *admin* explicitly so maintainers/writers can't change card snapshots.
      - name: Require repo admin
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner, repo: context.repo.repo, username: context.actor,
            });
            if (data.permission !== 'admin') {
              core.setFailed(`Only repo admins can set a card snapshot (you are: ${data.permission}).`);
            } else {
              core.info(`${context.actor} is admin — proceeding.`);
            }

      - uses: actions/checkout@v4
        with:
          persist-credentials: false   # this job builds its own authed remote for the push

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci   # pngjs for tools/fidelity_set_thumb.mjs + fidelity_index.mjs

      - name: Set card snapshot on gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUB: ${{ github.event.inputs.sub }}
          FIXTURE: ${{ github.event.inputs.fixture }}
        run: |
          set -e
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          WT="${{ runner.temp }}/gh-pages-thumb"
          pushed=0
          for attempt in 1 2 3 4 5; do
            rm -rf "$WT"
            if git ls-remote --exit-code --heads "$REMOTE" gh-pages >/dev/null 2>&1; then
              git clone -q --depth 1 --branch gh-pages "$REMOTE" "$WT"
            else
              echo "::error::gh-pages does not exist yet; publish a dashboard first"; exit 1
            fi
            git -C "$WT" config user.name "github-actions[bot]"
            git -C "$WT" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            # Validate + repoint the snapshot, then rebuild the landing gallery.
            node tools/fidelity_set_thumb.mjs "$WT/fidelity" "$SUB" "$FIXTURE"
            node tools/fidelity_index.mjs "$WT/fidelity"
            git -C "$WT" add -A
            if git -C "$WT" diff --cached --quiet; then echo "no change (already selected)"; pushed=1; break; fi
            git -C "$WT" commit -q -m "fidelity: set ${SUB} card snapshot to ${FIXTURE}"
            if git -C "$WT" push -q "$REMOTE" "HEAD:gh-pages"; then pushed=1; break; fi
            echo "gh-pages advanced (attempt ${attempt}); retrying"; sleep $((attempt * 2))
          done
          [ "$pushed" = "1" ] || { echo "::error::could not push snapshot change to gh-pages after retries"; exit 1; }
          echo "Updated ${SUB} card snapshot -> ${FIXTURE}. Gallery: https://ysetbon.github.io/OpenStrandJS/fidelity/"
